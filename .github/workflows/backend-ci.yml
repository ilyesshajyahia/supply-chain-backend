name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    env:
      MONGO_URI: mongodb://localhost:27017/chaintrace_ci
      RPC_URL: https://example-rpc.local
      SIGNER_PRIVATE_KEY: 0x1111111111111111111111111111111111111111111111111111111111111111
      ROLES_MANAGER_ADDRESS: 0x1111111111111111111111111111111111111111
      PRODUCT_REGISTRY_ADDRESS: 0x2222222222222222222222222222222222222222
      PRODUCT_LIFECYCLE_ADDRESS: 0x3333333333333333333333333333333333333333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Basic backend sanity check
        run: node -e "require('./src/app'); console.log('Backend app loaded')"
