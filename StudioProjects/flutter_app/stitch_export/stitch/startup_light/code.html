<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChainTrace | System Health Check</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary": "#ffffff",
              "inverse-primary": "#afc7f5",
              "on-secondary-fixed-variant": "#004881",
              "tertiary-container": "#442100",
              "surface-container-low": "#f2f4f7",
              "outline": "#74777f",
              "surface-dim": "#d8dadd",
              "on-primary": "#ffffff",
              "surface-container-high": "#e6e8eb",
              "inverse-on-surface": "#eff1f4",
              "on-surface": "#191c1e",
              "on-primary-fixed": "#001b3d",
              "surface-bright": "#f7f9fc",
              "on-tertiary-fixed": "#2f1500",
              "primary": "#001533",
              "on-error-container": "#93000a",
              "primary-fixed-dim": "#afc7f5",
              "on-tertiary-container": "#bc865a",
              "on-primary-container": "#7b92bd",
              "background": "#f7f9fc",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "surface-container-highest": "#e0e3e6",
              "tertiary": "#261000",
              "on-tertiary-fixed-variant": "#663d17",
              "tertiary-fixed-dim": "#f7ba8a",
              "surface-container": "#eceef1",
              "primary-container": "#0f2a4f",
              "secondary-fixed": "#d3e4ff",
              "on-secondary-container": "#003663",
              "inverse-surface": "#2d3133",
              "surface-container-lowest": "#ffffff",
              "surface-tint": "#475f87",
              "on-background": "#191c1e",
              "surface": "#f7f9fc",
              "outline-variant": "#c4c6cf",
              "primary-fixed": "#d6e3ff",
              "on-surface-variant": "#44474e",
              "secondary": "#0060a8",
              "tertiary-fixed": "#ffdcc3",
              "surface-variant": "#e0e3e6",
              "secondary-fixed-dim": "#a2c9ff",
              "on-tertiary": "#ffffff",
              "on-error": "#ffffff",
              "secondary-container": "#47a1ff",
              "on-secondary-fixed": "#001c38",
              "on-primary-fixed-variant": "#2f476e"

            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .spinner-ring {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glow-effect {
            box-shadow: 0 0 40px rgba(30, 136, 229, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container font-body flex flex-col min-h-screen items-center justify-center overflow-hidden">
<!-- Subtle Background Texture -->
<div class="absolute inset-0 opacity-10 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-secondary to-transparent"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center px-6 w-full max-w-md text-center">
<!-- Branding Header (TopAppBar Influence) -->
<header class="mb-16">
<h1 class="text-white text-3xl font-black tracking-tighter uppercase mb-2">
                ChainTrace
            </h1>
<div class="h-1 w-12 bg-secondary mx-auto rounded-full"></div>
</header>
<!-- Centered Status & Animation Section -->
<section class="flex flex-col items-center justify-center w-full">
<!-- Architectural Vault Visual -->
<div class="relative mb-12">
<!-- Outer Glass Ring -->
<div class="absolute inset-0 -m-8 rounded-full border border-white/5 glow-effect"></div>
<!-- Loading Spinner -->
<div class="relative bg-white/5 backdrop-blur-xl p-8 rounded-full border border-white/10">
<div class="spinner-ring"></div>
</div>
<!-- Floating Decorative Nodes (Architectural Minimalism) -->
<div class="absolute -top-4 -right-4 w-3 h-3 bg-secondary rounded-full animate-pulse"></div>
<div class="absolute -bottom-2 -left-6 w-2 h-2 bg-white/20 rounded-full"></div>
</div>
<!-- Status Typography -->
<div class="space-y-3">
<h2 class="text-white font-headline text-xl font-bold tracking-tight">
                    Checking Connectivity
                </h2>
<p class="text-on-primary-container font-label text-sm uppercase tracking-[0.2em]">
                    Verifying secure node handshake
                </p>
</div>
</section>
<!-- Action Footer -->
<footer class="mt-24 w-full px-8">
<button class="w-full py-4 px-6 rounded-xl border border-white/10 text-white font-semibold tracking-wide flex items-center justify-center gap-3 transition-all active:scale-95 hover:bg-white/5">
<span class="material-symbols-outlined text-[20px]" data-icon="refresh">refresh</span>
                Retry Connection
            </button>
<div class="mt-8 flex justify-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<span class="w-1.5 h-1.5 rounded-full bg-white/20"></span>
<span class="w-1.5 h-1.5 rounded-full bg-white/20"></span>
</div>
</footer>
<!-- Detail Meta (Enterprise Grade) -->
<aside class="absolute bottom-10 text-[10px] text-white/30 font-label uppercase tracking-widest">
            Protocol v4.0.2 • Secure Ledger Access
        </aside>
</main>
<!-- Visual Polish: Corner Decoration -->
<div class="absolute top-0 right-0 p-12 opacity-20 pointer-events-none">
<svg fill="none" height="120" viewbox="0 0 120 120" width="120" xmlns="http://www.w3.org/2000/svg">
<path d="M0 1H119V120" stroke="white" stroke-width="0.5"></path>
<circle cx="119" cy="1" fill="white" r="3"></circle>
</svg>
</div>
<!-- Hidden Navigation Shell Logic (Suppressed per "The Destination Rule" - Contextual Task-Focused Screen) -->
<!-- BottomNavBar and TopAppBar are suppressed for this focus-intense Startup Screen -->
</body></html>
